<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Cloud Foundations</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            margin: 0 auto;
        }
        
        h1 {
            color: #4285f4;
            font-size: 2.8em;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .logo-text {
            color: #34a853;
            font-size: 1.2em;
            text-align: center;
            margin-bottom: 50px;
        }
        
        .section {
            margin-bottom: 40px;
        }
        
        .section h2 {
            color: #4285f4;
            font-size: 1.8em;
            margin-bottom: 20px;
            border-bottom: 3px solid #34a853;
            padding-bottom: 10px;
        }
        
        .nav-menu {
            list-style: none;
        }
        
        .nav-menu li {
            margin-bottom: 15px;
        }
        
        .nav-menu a {
            display: block;
            padding: 15px 25px;
            background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.1em;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .nav-menu a:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(66, 133, 244, 0.4);
        }
        
        .icon {
            margin-right: 10px;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Google Cloud Foundations</h1>
        <p class="logo-text">Cursos e Laboratórios de Habilidade</p>
        
        <!-- Seção Cursos -->

            <ul class="nav-menu">

                    </a>
                </li>
                <li>
                    <a href="#">

                </li>
            </ul>
        </div>
        
        <!-- Seção Laboratórios de Habilidade -->
        <div class="section">
            <h2>🔬 Laboratórios de Habilidade</h2>
            <ul class="nav-menu">
                <li>
                    <a href="SET UP CHALLENGE GOOGLE.html">
                        <span class="icon">⚙️</span>

                    </a>
                </li>
                <li>
                    <a href="Build a Secure Google Cloud NetworkGCP Challenge Lab 7.html">
                        <span class="icon">🔒</span>

                    </a>

        </div>
    </div>
</body>
</html>
